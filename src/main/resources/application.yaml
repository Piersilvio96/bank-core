server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bankcore
    driver-class-name: org.postgresql.Driver
    username: bankcore
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    version: openapi_3_0