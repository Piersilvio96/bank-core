name: Test on main

on:
  push:
    branches:
      - main
    paths:
      - 'gradle/**'
      - 'src/**'
      - 'test/**'
      - 'build.gradle'
      - 'settings.gradle'
  pull_request:
    branches:
      - main
    paths:
      - 'gradle/**'
      - 'src/**'
      - 'test/**'
      - 'build.gradle'
      - 'settings.gradle'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Verify Docker
        run: |
          docker version
          docker info

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test/**
            build/test-results/test/**

